<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gerador de Tática OSM26</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; padding:20px; line-height:1.6; }
    input, textarea, button { width: 100%; padding: 8px; margin:6px 0; }
    .container { max-width:700px; margin:auto; }
    .result { white-space: pre-wrap; background:#f4f4f4; padding:10px; border-radius:5px; margin-top:10px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Gerador de Tática OSM26</h1>

  <h3>Upload dos 3 prints do adversário</h3>
  <input type="file" id="print1" accept="image/*">
  <input type="file" id="print2" accept="image/*">
  <input type="file" id="print3" accept="image/*">

  <button onclick="gerarTatica()">Gerar Tática</button>

  <h3>Tática Gerada</h3>
  <div id="output" class="result"></div>
</div>

<script>
async function lerPrint(file){
  if(!file) return "";
  const { data: { text } } = await Tesseract.recognize(file,'eng',{logger: m => console.log(m)});
  return text;
}

async function gerarTatica(){
  const output = document.getElementById("output");
  output.innerText = "Processando OCR... Aguarde...";

  let t1 = await lerPrint(document.getElementById("print1").files[0]);
  let t2 = await lerPrint(document.getElementById("print2").files[0]);
  let t3 = await lerPrint(document.getElementById("print3").files[0]);
  let textoCompleto = t1+"\n"+t2+"\n"+t3;

  // Estimativa simples de overalls
  let overall = textoCompleto.match(/Overall:\s*(\d+)/g)?.map(x=>parseInt(x.split(":")[1])) || [90,90,90,90,90];
  let formacao = textoCompleto.match(/\b\d-\d-\d\b/)?.[0] || "4-3-3B";

  const prompt = `
Você é especialista em OSM26. Com base nos prints:
Formação adversário: ${formacao}
Overalls: ${overall.join(", ")}
Gere a tática completa para o OSM26 incluindo sliders, mentalidade, pressão, ritmo e marcação.
`;

  try{
    const res = await fetch("http://localhost:3000/gerar-tatica", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({prompt})
    });
    const data = await res.json();
    output.innerText = data.text;
  }catch(err){
    output.innerText = "Erro ao gerar tática: "+err.message;
  }
}
</script>
</body>
</html>
